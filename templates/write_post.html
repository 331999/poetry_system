{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>写帖子</title>
    <link rel="stylesheet" href="css/navigation bar.css">
    <link rel="stylesheet" href="{% static 'css/editor.css' %}">
</head>

<body>
<div class="navigation_bar">
    <div class="left-logo">
        <div class="logo"><img src="{% static 'img/animal_logo.webp' %}" width="45"></div>
        <p>论坛</p>
    </div>

    <div class="right-function">
        <a href="list.html">主页</a>
        <a href="{% url 'write:post' %}">写帖子</a>
        <a href="loginRegister.html" target="_blank">注销</a>
    </div>
</div>

<button class="backToHomeBtn" id="backToHomeBtn">
    <a href="index.html"><img src="{% static 'img/loginRegister/backToHome.webp' %}" alt="返回首页" title="返回首页" class="BtnImg"></a>
</button>

<div class="blog-edit-container">
    <div class="title">
        <input type="text" placeholder="在这里写下主贴标题" id="title">
        <button id="submit">发布帖子</button>
    </div>

    <div id="editor" class="编辑器"></div>
    <link rel="stylesheet" href="editor.md/css/editormd.min.css"/>
    <script src="js/jquery.min.js"></script>
    <script src="editor.md/lib/marked.min.js"></script>
    <script src="editor.md/lib/prettify.min.js"></script>
    <script src="editor.md/editormd.js"></script>
</div>

</body>

</html>
