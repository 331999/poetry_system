{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码重置 - 古诗词鉴赏网</title>
    <link rel="stylesheet" href="{% static 'css/resetPassword.css' %}">
    <script src="{% static 'js/axios-0.18.0.min.js' %}"></script>
</head>

<body background="{% static 'img/loginRegister/background1.jpg' %}">
<button class="back-to-home">
    <a href="{% url 'index' %}"><img src="{% static 'img/loginRegister/backToHome.webp' %}" alt="返回首页"
                                     title="返回首页"></a>
</button>

<div class="reset-container">
    <div class="reset-box">
        <h1>密码重置</h1>

        <!-- 步骤指示器 -->
        <div class="step-indicator">
            <div class="step-dot active" id="dot1">1</div>
            <div class="step-line"></div>
            <div class="step-dot" id="dot2">2</div>
            <div class="step-line"></div>
            <div class="step-dot" id="dot3">3</div>
        </div>
        <div class="step-labels">
            <span>输入学号</span>
            <span>验证身份</span>
            <span>完成</span>
        </div>

        <!-- 步骤1: 输入学号 -->
        <div id="step1" class="step">
            <div class="form-group">
                <label for="username">学号</label>
                <input type="text" id="username" placeholder="请输入12位学号" maxlength="12">
                <span id="usernameSpan" aria-live="polite"></span>
            </div>
            <button id="getQuestionBtn" class="primary-btn">下一步</button>
        </div>

        <!-- 步骤2: 回答问题并设置新密码 -->
        <div id="step2" class="step hidden">
            <div class="question-display">
                <label>安全问题</label>
                <p id="securityQuestion"></p>
            </div>

            <div class="form-group">
                <label for="securityAnswer">答案</label>
                <input type="text" id="securityAnswer" placeholder="请输入安全问题答案">
                <span id="answerSpan" aria-live="polite"></span>
            </div>

            <div class="form-group">
                <label for="newPassword">新密码</label>
                <input type="password" id="newPassword" placeholder="8-20位，包含字母和数字">
                <span id="pwdSpan" aria-live="polite"></span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" id="confirmPassword" placeholder="再次输入新密码">
                <span id="confirmSpan" aria-live="polite"></span>
            </div>

            <div class="btn-group">
                <button id="backBtn" class="secondary-btn">上一步</button>
                <button id="resetBtn" class="primary-btn">重置密码</button>
            </div>
        </div>

        <!-- 步骤3: 完成 -->
        <div id="step3" class="step hidden">
            <div class="success-icon">✓</div>
            <p class="success-msg">密码重置成功！</p>
            <p class="success-desc">您的新密码已生效，请使用新密码登录</p>
            <a href="{% url 'users:login' %}" class="primary-btn login-link">去登录</a>
        </div>

        <div class="back-link">
            <a href="{% url 'users:login' %}">← 返回登录</a>
        </div>
    </div>
</div>

<script src="{% static 'js/resetPassword.js' %}"></script>
</body>

</html>
